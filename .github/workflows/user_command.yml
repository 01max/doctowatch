name: Telegram User Command

on:
  repository_dispatch:
    types: [user-command]

jobs:
  handle:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Write config
        run: echo "$DOCTOWATCH_CONFIG" > config.yml
        env:
          DOCTOWATCH_CONFIG: ${{ secrets.DOCTOWATCH_CONFIG }}

      - name: Handle Command
        uses: 01max/telegram-gh-action-dispatcher@v4
        with:
          command: ${{ github.event.client_payload.command }}
          chat_id: ${{ github.event.client_payload.chat_id }}
          args: ${{ github.event.client_payload.args }}
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
