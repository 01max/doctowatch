name: Poll Telegram Commands

on:
  schedule:
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: self-hosted
    permissions:
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Ruby and dependencies
        run: |
          git clone https://github.com/rbenv/rbenv.git ~/.rbenv || true
          git clone https://github.com/rbenv/ruby-build.git ~/.rbenv/plugins/ruby-build || true
          echo "$HOME/.rbenv/bin" >> $GITHUB_PATH
          echo "$HOME/.rbenv/shims" >> $GITHUB_PATH
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          rbenv install -s 3.2.0
          rbenv global 3.2.0
          gem install bundler
          bundle install

      - name: Download previous state
        uses: dawidd6/action-download-artifact@v9
        with:
          name: command-state
          path: tmp/previous
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Write config
        run: echo "$DOCTOWATCH_CONFIG" > config.yml
        env:
          DOCTOWATCH_CONFIG: ${{ secrets.DOCTOWATCH_CONFIG }}

      - name: Poll for commands
        run: bundle exec ruby poll_commands.rb
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload state
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: command-state
          path: tmp/command_state.json
          retention-days: 7
