name: Check Doctolib Availability

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ruby and dependencies
        run: |
          sudo apt-get install -y rbenv ruby-build
          rbenv install -s 3.2.0
          rbenv global 3.2.0
          eval "$(rbenv init -)"
          gem install bundler
          bundle install

      - name: Write config
        run: echo "$DOCTOWATCH_CONFIG" > config.yml
        env:
          DOCTOWATCH_CONFIG: ${{ secrets.DOCTOWATCH_CONFIG }}

      - name: Run availability check
        run: bundle exec ruby check.rb
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
