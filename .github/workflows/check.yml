name: Check Doctolib Availability

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_notify:
        description: 'Force notification even if slots are unchanged'
        type: boolean
        default: false

jobs:
  check:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Ruby and dependencies
        run: |
          git clone https://github.com/rbenv/rbenv.git ~/.rbenv || true
          git clone https://github.com/rbenv/ruby-build.git ~/.rbenv/plugins/ruby-build || true
          echo "$HOME/.rbenv/bin" >> $GITHUB_PATH
          echo "$HOME/.rbenv/shims" >> $GITHUB_PATH
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          rbenv install -s 3.2.0
          rbenv global 3.2.0
          gem install bundler
          bundle install

      - name: Download previous report
        uses: dawidd6/action-download-artifact@v9
        with:
          name: report
          path: tmp/previous
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Write config
        run: echo "$DOCTOWATCH_CONFIG" > config.yml
        env:
          DOCTOWATCH_CONFIG: ${{ secrets.DOCTOWATCH_CONFIG }}

      - name: Run availability check
        run: bundle exec ruby check.rb
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_DEFAULT_CHAT_ID: ${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}
          FORCE_NOTIFY: ${{ inputs.force_notify }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: report
          path: tmp/report.json
          retention-days: 7
